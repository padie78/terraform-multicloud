name: "Terraform Multi-Cloud"

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Formato: CLOUD_ENV (ej: AWS_DEV)'
        required: true
        type: string

jobs:
  terraform:
    runs-on: ubuntu-latest
    env:
      TF_VAR_source_db_password: ${{ secrets.SOURCE_DB_PASSWORD }}
      TF_VAR_target_db_password: ${{ secrets.TARGET_DB_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse Input
        id: parse
        run: |
          echo "folder=$(echo ${{ github.event.inputs.target }} | cut -d'_' -f1 | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          echo "workspace=$(echo ${{ github.event.inputs.target }} | cut -d'_' -f2 | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      # --- CONEXIÓN CON AWS ---
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1 # Ajusta a tu región principal

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Execution
        run: |
          cd ${{ steps.parse.outputs.folder }}
          terraform init
          
          # ESTA ES LA LÍNEA QUE DEBES CAMBIAR:
          terraform workspace select -or-create ${{ steps.parse.outputs.workspace }}          
          terraform plan -out=tfplan
          terraform apply -auto-approve tfplan